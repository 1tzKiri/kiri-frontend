<input id="email">
<input id="password">
<button onclick="login()">Login</button>

<script>
async function login(){
  const res = await fetch("YOUR_API/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  if(res.ok){
    window.location.href = "/dashboard.html";
  } else {
    alert("Wrong login");
  }
}
</script>
