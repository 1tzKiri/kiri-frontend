<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kiri AI Widget</title>

<style>
body{margin:0;background:#111;color:white;font-family:sans-serif}
#messages{height:400px;overflow-y:auto;padding:10px}
.msg{margin:6px 0;padding:8px;border-radius:8px;max-width:80%}
.user{background:#2563eb;margin-left:auto}
.bot{background:#333}
#inputBar{display:flex}
#input{flex:1;padding:10px}
button{padding:10px}
</style>

</head>
<body>

<div id="messages"></div>

<div id="inputBar">
<input id="input" placeholder="Type..." 
onkeydown="if(event.key==='Enter'){event.preventDefault();send()}" />
<button onclick="send()">Send</button>
</div>

<script>

let conversationId = localStorage.getItem("conversationId");
const KIRI_API = "https://kiri-backend-prod-production.up.railway.app";

const SITE_KEY =
  new URLSearchParams(window.location.search).get("site_key") ||
  new URLSearchParams(window.location.search).get("siteKey");

let sending = false;
let lastMessageCount = 0;

async function send(){

  if (sending) return;
  sending = true;

  const input = document.getElementById("input");
  const messages = document.getElementById("messages");

  const text = input.value.trim();

  if(!text){
    sending = false;
    return;
  }

  messages.innerHTML += <div class="msg user">${text}</div>;
  input.value="";
  messages.scrollTop = messages.scrollHeight;

  try{

    const res = await fetch(${KIRI_API}/ask,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:text,
        conversationId,
        site_key:SITE_KEY
      })
    });

    const data = await res.json();

    if(data.conversationId){
      conversationId = data.conversationId;
      localStorage.setItem("conversationId",conversationId);
    }

    if(!res.ok){
      messages.innerHTML += <div class="msg bot">${data.error || "Error"}</div>;
    }else{
      messages.innerHTML += <div class="msg bot">${data.reply}</div>;
    }

    messages.scrollTop = messages.scrollHeight;

  }catch(err){
    messages.innerHTML += <div class="msg bot">Server error</div>;
    console.error(err);
  }

  sending = false;
}

/* 🔥 SAFE REFRESH (NO DUPLICATES) */
setInterval(async () => {

  if (!conversationId) return;

  try {
    const res = await fetch(${KIRI_API}/admin/messages/${conversationId});
    const data = await res.json();

    const messages = document.getElementById("messages");

    if (data.length <= lastMessageCount) return;

    for (let i = lastMessageCount; i < data.length; i++) {
      const m = data[i];

      messages.innerHTML += `
        <div class="msg ${m.role === "user" ? "user" : "bot"}">
          ${m.content}
        </div>
      `;
    }

    lastMessageCount = data.length;
    messages.scrollTop = messages.scrollHeight;

  } catch (err) {
    console.error(err);
  }

}, 2000);

</script>

</body>
</html>
