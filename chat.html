<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiri AI Widget</title>

<style>
*{box-sizing:border-box}

:root{
  --bg:#0b1020;
  --panel:#111827;
  --panel2:#0f172a;
  --border:rgba(255,255,255,0.10);
  --text:#f8fafc;
  --muted:#94a3b8;
  --blue:#2563eb;
  --blue2:#3b82f6;
  --green:#22c55e;
  --red:#ef4444;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  overflow:hidden;
}

#kiri-widget{
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at top left,rgba(37,99,235,.22),transparent 35%),
    linear-gradient(180deg,#111827,#0b1020);
  border-radius:22px;
  overflow:hidden;
  border:1px solid var(--border);
  box-shadow:0 25px 70px rgba(0,0,0,.45);
  display:flex;
  flex-direction:column;
}

#header{
  padding:16px;
  background:rgba(2,6,23,.72);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  backdrop-filter:blur(12px);
}

.header-left{
  display:flex;
  align-items:center;
  gap:11px;
}

.bot-avatar{
  width:34px;
  height:34px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--blue),#22c55e,#a855f7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  color:white;
}

.title-wrap{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.title{
  font-weight:800;
  color:white;
  font-size:15px;
}

.status{
  display:flex;
  align-items:center;
  gap:6px;
  color:#86efac;
  font-size:12px;
}

.live-dot{
  width:7px;
  height:7px;
  background:#22c55e;
  border-radius:50%;
  box-shadow:0 0 8px #22c55e;
}

#close{
  width:34px;
  height:34px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:12px;
  color:#cbd5e1;
  font-size:20px;
  cursor:pointer;
}

#close:hover{
  background:rgba(239,68,68,.12);
  color:white;
}

#messages{
  flex:1;
  padding:18px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
  scroll-behavior:smooth;
}

#messages::-webkit-scrollbar{
  width:6px;
}

#messages::-webkit-scrollbar-thumb{
  background:#334155;
  border-radius:20px;
}

.msg{
  max-width:82%;
  padding:11px 14px;
  border-radius:16px;
  font-size:14px;
  line-height:1.45;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
}

.user{
  align-self:flex-end;
  background:linear-gradient(135deg,var(--blue),#1d4ed8);
  color:white;
  border-bottom-right-radius:6px;
}

.bot{
  align-self:flex-start;
  background:rgba(15,23,42,.92);
  color:#e5e7eb;
  border:1px solid rgba(255,255,255,0.07);
  border-bottom-left-radius:6px;
}

.human{
  align-self:flex-start;
  background:rgba(20,83,45,.9);
  color:#dcfce7;
  border:1px solid rgba(34,197,94,.25);
  border-bottom-left-radius:6px;
}

.welcome{
  background:rgba(15,23,42,.92);
  color:#e5e7eb;
  border:1px solid rgba(255,255,255,0.07);
}

#inputBar{
  display:flex;
  gap:10px;
  padding:14px;
  border-top:1px solid var(--border);
  background:rgba(2,6,23,.72);
  backdrop-filter:blur(12px);
}

#input{
  flex:1;
  min-width:0;
  background:#0f172a;
  border:1px solid rgba(255,255,255,0.10);
  border-radius:14px;
  padding:12px 14px;
  color:white;
  outline:none;
  font-size:14px;
}

#input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.18);
}

#sendBtn{
  width:46px;
  min-width:46px;
  height:46px;
  background:linear-gradient(135deg,var(--blue),#3b82f6);
  border:0;
  border-radius:14px;
  color:white;
  cursor:pointer;
  font-size:17px;
  font-weight:900;
}

#sendBtn:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.typing{
  display:flex;
  align-items:center;
  gap:4px;
}

.typing span{
  width:6px;
  height:6px;
  background:#cbd5e1;
  border-radius:50%;
  animation:blink 1.4s infinite both;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
  0%{opacity:.2;transform:translateY(0)}
  20%{opacity:1;transform:translateY(-2px)}
  100%{opacity:.2;transform:translateY(0)}
}

.small-note{
  text-align:center;
  color:var(--muted);
  font-size:11px;
  padding-bottom:10px;
}

@media(max-width:520px){
  #kiri-widget{border-radius:20px}
  #messages{padding:14px}
  .msg{max-width:88%}
}
</style>
</head>

<body>

<div id="kiri-widget">

  <div id="header">
    <div class="header-left">
      <div class="bot-avatar">✦</div>

      <div class="title-wrap">
        <div class="title">Kiri AI</div>

        <div class="status">
          <span class="live-dot"></span>
          <span>Online</span>
        </div>
      </div>
    </div>

    <button id="close">×</button>
  </div>

  <div id="messages">
    <div class="msg bot welcome" id="welcomeMessage">
      Hi! How can I help you today?
    </div>
  </div>

  <div id="inputBar">
    <input id="input" placeholder="Type your message..." autocomplete="off" />
    <button id="sendBtn">➤</button>
  </div>

  <div class="small-note">Powered by Kiri AI</div>

</div>

<script>
const KIRI_API = "https://kiri-backend-prod-production.up.railway.app";

const SITE_KEY =
  new URLSearchParams(window.location.search).get("site_key") ||
  new URLSearchParams(window.location.search).get("siteKey");

const USER_LANG =
  navigator.language ||
  navigator.userLanguage ||
  "en";

let conversationId =
  sessionStorage.getItem("kiri_conversation_" + SITE_KEY);

let sending = false;
let hasLoadedHistory = false;

const input = document.getElementById("input");
const messages = document.getElementById("messages");
const sendBtn = document.getElementById("sendBtn");

document.getElementById("close").onclick = () => {
  parent.postMessage(
    "kiri-close",
    "https://kiri-frontend.vercel.app"
  );
};

sendBtn.onclick = send;

input.addEventListener("keydown", (event) => {
  if(event.key === "Enter"){
    event.preventDefault();
    send();
  }
});

function escapeHTML(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function addMessage(role, text){
  const div = document.createElement("div");

  let className = "msg bot";

  if(role === "user") className = "msg user";
  if(role === "human") className = "msg human";
  if(role === "assistant") className = "msg bot";
  if(role === "bot") className = "msg bot";

  div.className = className;
  div.innerHTML = escapeHTML(text);

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function renderMessagesFromDatabase(data){
  messages.innerHTML = "";

  if(!Array.isArray(data) || data.length === 0){
    const welcomeText =
      document.getElementById("welcomeMessage")?.innerText ||
      "Hi! How can I help you today?";

    addMessage("bot", welcomeText);
    return;
  }

  data.forEach(m => {
    addMessage(m.role || "assistant", m.content || "");
  });
}

function addTyping(){
  const div = document.createElement("div");
  div.className = "msg bot";
  div.id = "typingBubble";
  div.innerHTML =
    `<div class="typing">
      <span></span>
      <span></span>
      <span></span>
    </div>`;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping(){
  const typing = document.getElementById("typingBubble");
  if(typing) typing.remove();
}

async function loadWidgetSettings(){
  try{
    const res = await fetch(
      `${KIRI_API}/widget-settings?site_key=${SITE_KEY}`
    );

    const data = await res.json();

    const title = data.widget_title || "Kiri AI";
    const welcome =
      data.welcome_message ||
      "Hi! How can I help you today?";
    const color = data.primary_color || "#2563eb";

    document.querySelector(".title").innerText = title;
    document.documentElement.style.setProperty("--blue", color);

    const welcomeEl = document.getElementById("welcomeMessage");
    if(welcomeEl){
      welcomeEl.innerText = welcome;
    }

  }catch(err){
    console.log("Could not load widget settings", err);
  }
}

async function send(){
  if(sending) return;

  const text = input.value.trim();

  if(!text) return;

  if(!SITE_KEY){
    addMessage(
      "bot",
      "Missing site key. Please check your install script."
    );
    return;
  }

  sending = true;
  sendBtn.disabled = true;

  if(!hasLoadedHistory && !conversationId){
    hasLoadedHistory = true;
  }

  addMessage("user", text);

  input.value = "";
  addTyping();

  try{
    const res = await fetch(`${KIRI_API}/ask`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:text,
        conversationId,
        site_key:SITE_KEY,
        language:USER_LANG
      })
    });

    const data = await res.json();

    removeTyping();

    if(data.conversationId){
      conversationId = data.conversationId;

      sessionStorage.setItem(
        "kiri_conversation_" + SITE_KEY,
        conversationId
      );
    }

    if(!res.ok){
      addMessage(
        "bot",
        data.error || "Something went wrong."
      );
      return;
    }

    addMessage("assistant", data.reply || "No response.");

    setTimeout(refreshMessages, 800);

  }catch(err){
    removeTyping();

    addMessage(
      "bot",
      "Server error. Try again later."
    );

    console.error(err);

  }finally{
    sending = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

async function refreshMessages(){
  if(!conversationId || !SITE_KEY) return;

  try{
    const res = await fetch(
      `${KIRI_API}/messages/${conversationId}?site_key=${SITE_KEY}`
    );

    const data = await res.json();

    if(!Array.isArray(data)) return;

    renderMessagesFromDatabase(data);
    hasLoadedHistory = true;

  }catch(err){
    console.log("Widget refresh error:", err);
  }
}

async function init(){
  await loadWidgetSettings();

  if(conversationId){
    setTimeout(refreshMessages, 1000);
  }
}

init();
setInterval(refreshMessages, 3000);
</script>

</body>
</html>
