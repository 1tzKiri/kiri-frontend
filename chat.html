<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kiri AI Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

:root {
  --border: rgba(255,255,255,0.08);
}

body {
  margin:0;
  background:transparent;
  font-family:'Inter','Segoe UI',sans-serif;
}

.header-left{
  display:flex;
  align-items:center;
  gap:8px;
}

.live-dot{
  width:8px;
  height:8px;
  background:#00ff5b;
  border-radius:50%;
  box-shadow:0 0 6px #00ff5b;
}

.title{
  font-weight:600;
  color:white;
}

#kiri-widget{
  position:fixed;
  bottom:24px;
  right:24px;
  width:360px;
  height:520px;
  background:#1a1a1a;
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  display:flex;
  flex-direction:column;
  z-index:9999;
}

#header{
  background:#000;
  color:#fff;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-family:'Poppins',sans-serif;
  font-weight:600;
}

#close{
  background:none;
  border:none;
  color:#e11d48;
  font-size:18px;
  cursor:pointer;
}

#messages{
  flex:1;
  padding:16px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
  background:#1a1a1a;
}

.msg{
  max-width:80%;
  padding:10px 14px;
  border-radius:14px;
  font-size:14px;
}

.user{
  align-self:flex-end;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
}

.bot{
  align-self:flex-start;
  background:#1f2937;
  color:#e5e7eb;
  border:1px solid rgba(255,255,255,0.05);
}

#inputBar{
  display:flex;
  gap:10px;
  padding:14px;
  border-top:1px solid var(--border);
}

#input{
  flex:1;
  background:#111827;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:10px 14px;
  color:white;
  outline:none;
}

button{
  background:#000;
  border:1px solid var(--border);
  border-radius:12px;
  padding:0 16px;
  color:white;
  cursor:pointer;
}

.typing span{
  display:inline-block;
  width:6px;
  height:6px;
  margin-right:4px;
  background:#fff;
  border-radius:50%;
  animation:blink 1.4s infinite both;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%{opacity:.2}
20%{opacity:1}
100%{opacity:.2}
}

</style>
</head>

<body>

<div id="kiri-widget">

<div id="header">
<div class="header-left">
<span class="live-dot"></span>
<span class="title">KIRI AI</span>
</div>
<button id="close">×</button>
</div>

<div id="messages">
<div class="msg bot">Hello. How can I help you?</div>
</div>

<div id="inputBar">
<input id="input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') send()" />
<button onclick="send()">Send</button>
</div>

</div>

<script>

let conversationId = localStorage.getItem("conversationId");

const KIRI_API = "https://kiri-backend-prod-production.up.railway.app";

const SITE_KEY = new URLSearchParams(window.location.search).get("siteKey");

document.getElementById("close").onclick = () => {
parent.postMessage("kiri-close","*");
};

async function send(){

const input=document.getElementById("input");
const messages=document.getElementById("messages");

const text=input.value.trim();
if(!text)return;

messages.innerHTML += `<div class="msg user">${text}</div>`;

input.value="";
messages.scrollTop=messages.scrollHeight;

const typing=document.createElement("div");
typing.className="msg bot";
typing.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`;
messages.appendChild(typing);

messages.scrollTop=messages.scrollHeight;

try{

const res=await fetch(`${KIRI_API}/ask`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text,
conversationId,
site_key:SITE_KEY
})
});

const data=await res.json();

if(data.conversationId){
conversationId=data.conversationId;
localStorage.setItem("conversationId",conversationId);
}

messages.removeChild(typing);

if(!res.ok){

messages.innerHTML += `<div class="msg bot">${data.error || "Limit reached. Try again later."}</div>`;

}else{

messages.innerHTML += `<div class="msg bot">${data.reply}</div>`;

if(data.reply.includes("human agent") && !document.getElementById("returnAI")){

messages.innerHTML += `
<button id="returnAI" style="
margin-top:8px;
padding:6px 12px;
border-radius:8px;
background:#111;
border:1px solid rgba(255,255,255,0.1);
color:white;
cursor:pointer;
">Return to AI</button>
`;

setTimeout(()=>{

const btn=document.getElementById("returnAI");

if(btn){

btn.onclick=async()=>{

await fetch(`${KIRI_API}/admin/return-to-ai`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
conversationId
})
});

messages.innerHTML += `<div class="msg bot">AI assistant reactivated.</div>`;

messages.scrollTop=messages.scrollHeight;

btn.remove();

};

}

},50);

}

}

messages.scrollTop=messages.scrollHeight;

}catch(err){

messages.removeChild(typing);

messages.innerHTML += `<div class="msg bot">Server error. Try again later.</div>`;

console.error(err);

}

}

</script>

</body>
</html>
