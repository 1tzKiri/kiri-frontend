<!DOCTYPE html>
<html>
<head>
  <title>Kiri Admin</title>
  <style>
    body {
      font-family: Arial;
      max-width: 500px;
      margin: 60px auto;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    #result {
      margin-top: 20px;
      word-break: break-all;
      background: #f5f5f5;
      padding: 10px;
    }
  </style>
</head>
<body>

<h2>Kiri Admin Panel</h2>

<input type="password" id="password" placeholder="Admin password">

<input type="text" id="name" placeholder="Client name">
<input type="text" id="domain" placeholder="Client domain (example.com)">
  <select id="plan">
  <option value="free">Free</option>
  <option value="starter">Starter</option>
  <option value="pro">Pro</option>
</select>

<button onclick="createSite()">Create Client</button>

<div id="result"></div>

<script>
const ADMIN_PASSWORD = "kiri-super-admin"; // change later

async function createSite() {
  const password = document.getElementById("password").value;
  if (password !== ADMIN_PASSWORD) {
    alert("Unauthorized");
    return;
  }

  const name = document.getElementById("name").value;
  const domain = document.getElementById("domain").value;
  const plan = document.getElementById("plan").value;

  const res = await fetch("https://kiri-backend-prod-production.up.railway.app/create-site", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, domain, plan })
  });

  const data = await res.json();

 document.getElementById("result").innerHTML = `
  <strong>Site Key:</strong><br>${data.siteKey}<br><br>

  <strong>Embed Code:</strong>
  <textarea style="width:100%;height:90px;margin-top:10px;">
${data.embed}
  </textarea>
`;
}
</script>

Wysłano
<hr>

<h2>Conversations</h2>
<div id="conversations"></div>

<hr>

<h2>Chat</h2>
<div id="chat"></div>

<input id="replyInput" placeholder="Reply as human">
<button onclick="sendReply()">Send</button>

<script>

let currentConversationId = null;

async function loadConversations() {
  const res = await fetch("https://kiri-backend-prod-production.up.railway.app/admin/conversations");
  const data = await res.json();

  const container = document.getElementById("conversations");
  container.innerHTML = "";

  data.forEach(c => {
    const div = document.createElement("div");
    div.style.cursor = "pointer";
    div.style.marginBottom = "10px";

    div.innerText = #${c.id} | ${c.domain} | ${c.human_takeover ? "HUMAN" : "AI"};

    div.onclick = () => loadMessages(c.id);

    container.appendChild(div);
  });
}

async function loadMessages(id) {
  currentConversationId = id;

  const res = await fetch(https://kiri-backend-prod-production.up.railway.app/admin/messages/${id});
  const data = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.innerText = ${m.role}: ${m.content};
    chat.appendChild(div);
  });
}

async function sendReply() {
  const input = document.getElementById("replyInput");

  await fetch("https://kiri-backend-prod-production.up.railway.app/admin/reply", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      conversationId: currentConversationId,
      message: input.value
    })
  });

  input.value = "";
  loadMessages(currentConversationId);
}

loadConversations();

</script>
</body>
</html>
