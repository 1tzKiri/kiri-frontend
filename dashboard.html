<!DOCTYPE html>
<html>
<head>
  <title>Kiri Dashboard</title>
</head>

<body>

<h2>Conversations</h2>
<div id="conversations"></div>

<h2>Chat</h2>
<div id="chat" style="margin-bottom:20px;"></div>

<input id="replyInput" placeholder="Reply as human">
<button onclick="sendReply()">Send</button>

<script>

// 🔐 PASSWORD
const password = prompt("Enter admin password");

if (password !== "kiri-admin-123") {
  document.body.innerHTML = "Access denied";
  throw new Error("Unauthorized");
}

// 🌐 API
const API = "https://kiri-backend-prod-production.up.railway.app";

let currentConversationId = null;
let lastMessageCount = 0;

// 🔔 SOUND
const notificationSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

// 📥 LOAD CONVERSATIONS
async function loadConversations() {
  try {
    const res = await fetch(API + "/admin/conversations");
    const data = await res.json();

    const container = document.getElementById("conversations");
    container.innerHTML = "";

    data.forEach((conv, index) => {

      const div = document.createElement("div");

      div.style.padding = "10px";
      div.style.border = "1px solid #ddd";
      div.style.borderRadius = "8px";
      div.style.marginBottom = "10px";
      div.style.cursor = "pointer";

      if (conv.id === currentConversationId) {
        div.style.background = "#f0f0f0";
      }

      div.innerHTML = `
        <strong>Customer ${index + 1}</strong><br>
        <small>${conv.domain}</small><br>
        <span style="color:gray;">Click to open chat</span>
      `;

      div.onclick = () => {
        currentConversationId = conv.id;
        lastMessageCount = 0; // reset tracking
        loadMessages(conv.id);
        loadConversations();
      };

      container.appendChild(div);
    });

  } catch (err) {
    console.error("Conversations error:", err);
  }
}

// 💬 LOAD MESSAGES
async function loadMessages(id) {
  try {
    const res = await fetch(API + "/admin/messages/" + id);
    const data = await res.json();

    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    data.forEach(msg => {
      const div = document.createElement("div");

      div.style.marginBottom = "6px";

      if (msg.role === "user") div.style.color = "blue";
      if (msg.role === "human") div.style.color = "green";

      div.innerText = msg.role + ": " + msg.content;

      chat.appendChild(div);
    });

    lastMessageCount = data.length;

  } catch (err) {
    console.error("Messages error:", err);
  }
}

// 📤 SEND REPLY
async function sendReply() {
  const input = document.getElementById("replyInput");

  if (!currentConversationId) {
    alert("Click conversation first");
    return;
  }

  const text = input.value.trim();
  if (!text) return;

  await fetch(API + "/admin/reply", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      conversationId: currentConversationId,
      message: text
    })
  });

  input.value = "";
  loadMessages(currentConversationId);
}

// 🔁 LIVE CHAT + NOTIFICATIONS
setInterval(async () => {
  if (!currentConversationId) return;

  try {
    const res = await fetch(API + "/admin/messages/" + currentConversationId);
    const data = await res.json();

    const chat = document.getElementById("chat");

    if (data.length > lastMessageCount) {

      const newMessages = data.slice(lastMessageCount);

      newMessages.forEach(msg => {
        const div = document.createElement("div");

        div.style.marginBottom = "6px";

        if (msg.role === "user") {
          div.style.color = "blue";
          notificationSound.play();
          alert("New message from user");
        }

        if (msg.role === "human") {
          div.style.color = "green";
        }

        div.innerText = msg.role + ": " + msg.content;

        chat.appendChild(div);
      });

      lastMessageCount = data.length;
      chat.scrollTop = chat.scrollHeight;
    }

  } catch (err) {
    console.error("Refresh error:", err);
  }

}, 2000);

// 🔁 REFRESH CONVERSATIONS
setInterval(() => {
  loadConversations();
}, 5000);

// 🚀 INIT
loadConversations();

</script>

</body>
</html>
