<!DOCTYPE html>
<html>
<head>
  <title>Kiri Dashboard</title>

  <style>
    body { margin:0; font-family: Arial; display:flex; height:100vh; }
    #sidebar { width:300px; border-right:1px solid #ddd; padding:15px; overflow-y:auto; }
    #chatContainer { flex:1; display:flex; flex-direction:column; }
    #chat { flex:1; padding:15px; overflow-y:auto; background:#f9f9f9; display:flex; flex-direction:column; }
    .bubble { max-width:60%; padding:10px; margin-bottom:10px; border-radius:10px; }
    .user { background:#e3f2fd; align-self:flex-start; }
    .human { background:#d1ffd6; align-self:flex-end; }
    #inputBar { display:flex; padding:10px; border-top:1px solid #ddd; }
    #replyInput { flex:1; padding:10px; }
    button { padding:10px; margin-top:5px; }
    .conversation { padding:10px; border-bottom:1px solid #eee; cursor:pointer; }
    .active { background:#f0f0f0; }
    .badge { float:right; background:red; color:white; font-size:12px; padding:2px 6px; border-radius:10px; }
  </style>
</head>

<body>

<div id="sidebar">

  <!-- 🔥 ADMIN PANEL -->
  <div id="adminPanel" style="padding:10px; border-bottom:1px solid #ddd;">
    <h3>Create Client</h3>
    <input id="newEmail" placeholder="email"><br>
    <input id="newPassword" placeholder="password"><br>
    <button onclick="createUser()">Create</button>
    <div id="result"></div>
  </div>

  <h3>Conversations</h3>
  <div id="conversations"></div>

</div>

<div id="chatContainer">
  <div id="chat"></div>

  <div id="inputBar">
    <input id="replyInput" placeholder="Reply as human">
    <button onclick="sendReply()">Send</button>
  </div>
</div>

<script>

// ================= USER =================
let user = null;

try {
  user = JSON.parse(localStorage.getItem("user"));
} catch (e) {
  console.log("parse error");
}

// 🔥 ONLY redirect if you're NOT already on login
if (!user || !user.role) {
  if (!window.location.pathname.includes("login")) {
    console.log("redirecting to login...");
    window.location.href = "/login.html";
  }
}
const isAdmin = user.role === "admin";

// hide admin panel if not admin
if (!isAdmin) {
  const panel = document.getElementById("adminPanel");
  if (panel) panel.style.display = "none";
}

// ================= CONFIG =================
const API = "https://kiri-backend-prod-production.up.railway.app";

let currentConversationId = null;
let lastCounts = {};
let unread = {};

const sound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

// ================= HELPERS =================
function getConversationsURL() {
  return isAdmin
    ? API + "/admin/conversations"
    : API + "/conversations?site_key=" + user.site_key;
}

// ================= LOAD CONVERSATIONS =================
async function loadConversations() {
  try {
    const res = await fetch(getConversationsURL());
    const data = await res.json();

    const container = document.getElementById("conversations");
    container.innerHTML = "";

    data.forEach((conv, index) => {

      const div = document.createElement("div");
      div.className = "conversation";

      if (conv.id === currentConversationId) {
        div.classList.add("active");
      }

      let badge = "";
      if (unread[conv.id] > 0) {
        badge = `<span class="badge">${unread[conv.id]}</span>`;
      }

      div.innerHTML = `
        <strong>Customer ${index + 1}</strong><br>
        <small>${conv.domain}</small>
        ${badge}
      `;

      div.onclick = () => {
        currentConversationId = conv.id;
        unread[conv.id] = 0;
        loadMessages(conv.id);
        loadConversations();
      };

      container.appendChild(div);
    });

  } catch (e) {
    console.error("loadConversations error:", e);
  }
}

// ================= LOAD MESSAGES =================
async function loadMessages(id) {
  try {
    const endpoint = isAdmin
      ? API + "/admin/messages/" + id
      : API + "/messages/" + id;

    const res = await fetch(endpoint);
    const data = await res.json();

    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    data.forEach(m => {
      const div = document.createElement("div");
      div.className = "bubble " + (m.role === "user" ? "user" : "human");
      div.innerText = m.content;
      chat.appendChild(div);
    });

    lastCounts[id] = data.length;
    chat.scrollTop = chat.scrollHeight;

  } catch (e) {
    console.error("loadMessages error:", e);
  }
}

// ================= SEND MESSAGE =================
async function sendReply() {
  const input = document.getElementById("replyInput");

  if (!currentConversationId || !input.value) return;

  try {
    const endpoint = isAdmin
      ? API + "/admin/reply"
      : API + "/reply";

    await fetch(endpoint, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        conversationId: currentConversationId,
        message: input.value
      })
    });

    input.value = "";
    loadMessages(currentConversationId);

  } catch (e) {
    console.error("sendReply error:", e);
  }
}

// ================= CREATE USER =================
async function createUser() {
  const email = document.getElementById("newEmail").value;
  const password = document.getElementById("newPassword").value;

  if (!email || !password) return alert("Fill fields");

  try {
    const res = await fetch(API + "/admin/create-user", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
      "Client created | site_key: " + data.site_key;

  } catch (e) {
    console.error("createUser error:", e);
  }
}

// ================= LIVE UPDATES =================
setInterval(async () => {
  try {
    const res = await fetch(getConversationsURL());
    const convs = await res.json();

    for (let c of convs) {

      const endpoint = isAdmin
        ? API + "/admin/messages/" + c.id
        : API + "/messages/" + c.id;

      const res2 = await fetch(endpoint);
      const msgs = await res2.json();

      if (!lastCounts[c.id]) {
        lastCounts[c.id] = msgs.length;
      }

      if (msgs.length > lastCounts[c.id]) {

        if (c.id !== currentConversationId) {
          unread[c.id] = (unread[c.id] || 0) + (msgs.length - lastCounts[c.id]);
          sound.play();
        }

        if (c.id === currentConversationId) {
          loadMessages(c.id);
        }

        lastCounts[c.id] = msgs.length;
      }
    }

    loadConversations();

  } catch (e) {
    console.error("live update error:", e);
  }

}, 3000);

// ================= INIT =================
loadConversations();

</script>
</body>
</html>
