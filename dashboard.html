<!DOCTYPE html>
<html>
<head>
  <title>Kiri Dashboard</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      display:flex;
      height:100vh;
    }

    #sidebar {
      width:300px;
      border-right:1px solid #ddd;
      padding:15px;
      overflow-y:auto;
    }

    #chatContainer {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    #chat {
      flex:1;
      padding:15px;
      overflow-y:auto;
      background:#f9f9f9;
    }

    .bubble {
      max-width:60%;
      padding:10px;
      margin-bottom:10px;
      border-radius:10px;
    }

    .user {
      background:#e3f2fd;
      align-self:flex-start;
    }

    .human {
      background:#d1ffd6;
      align-self:flex-end;
    }

    #inputBar {
      display:flex;
      padding:10px;
      border-top:1px solid #ddd;
    }

    #replyInput {
      flex:1;
      padding:10px;
    }

    button {
      padding:10px;
    }

    .conversation {
      padding:10px;
      border-bottom:1px solid #eee;
      cursor:pointer;
      position:relative;
    }

    .active {
      background:#f0f0f0;
    }

    .badge {
      position:absolute;
      right:10px;
      top:10px;
      background:red;
      color:white;
      font-size:12px;
      padding:2px 6px;
      border-radius:10px;
    }
  </style>

</head>

<body>

<div id="sidebar">
  <h3>Conversations</h3>
  <div id="conversations"></div>
</div>

<div id="chatContainer">

  <div id="chat"></div>

  <div id="inputBar">
    <input id="replyInput" placeholder="Reply as human">
    <button onclick="sendReply()">Send</button>
  </div>

</div>

<script>

// PASSWORD
const password = prompt("Enter admin password");
if (password !== "kiri-admin-123") {
  document.body.innerHTML = "Access denied";
  throw new Error("Unauthorized");
}

const API = "https://kiri-backend-prod-production.up.railway.app";

let currentConversationId = null;
let lastMessageCount = 0;
let unread = {};

// SOUND
const notificationSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

// LOAD CONVERSATIONS
async function loadConversations() {
  const res = await fetch(API + "/admin/conversations");
  const data = await res.json();

  const container = document.getElementById("conversations");
  container.innerHTML = "";

  data.forEach((conv, index) => {

    const div = document.createElement("div");
    div.className = "conversation";

    if (conv.id === currentConversationId) {
      div.classList.add("active");
    }

    div.innerHTML = `
      <strong>Customer ${index + 1}</strong><br>
      <small>${conv.domain}</small>
      ${unread[conv.id] ? <span class="badge">${unread[conv.id]}</span> : ""}
    `;

    div.onclick = () => {
      currentConversationId = conv.id;
      unread[conv.id] = 0;
      lastMessageCount = 0;
      loadMessages(conv.id);
      loadConversations();
    };

    container.appendChild(div);
  });
}

// LOAD MESSAGES
async function loadMessages(id) {
  const res = await fetch(API + "/admin/messages/" + id);
  const data = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(msg => {
    const div = document.createElement("div");

    div.className = "bubble " + (msg.role === "user" ? "user" : "human");
    div.innerText = msg.content;

    chat.appendChild(div);
  });

  lastMessageCount = data.length;
  chat.scrollTop = chat.scrollHeight;
}

// SEND
async function sendReply() {
  const input = document.getElementById("replyInput");

  if (!currentConversationId) return;

  await fetch(API + "/admin/reply", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      conversationId: currentConversationId,
      message: input.value
    })
  });

  input.value = "";
  loadMessages(currentConversationId);
}

// LIVE SYSTEM
setInterval(async () => {
  const res = await fetch(API + "/admin/conversations");
  const convs = await res.json();

  for (let conv of convs) {

    const res2 = await fetch(API + "/admin/messages/" + conv.id);
    const msgs = await res2.json();

    if (msgs.length > (unread[conv.id] || 0)) {

      if (conv.id !== currentConversationId) {
        unread[conv.id] = (msgs.length - lastMessageCount);
        notificationSound.play();
      }

      if (conv.id === currentConversationId) {
        loadMessages(conv.id);
      }
    }
  }

  loadConversations();

}, 3000);

// INIT
loadConversations();

</script>

</body>
</html>
